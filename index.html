<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    <h3>ভিডিও লোড হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...</h3>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');

        if (videoUrl) {
            // iframe ছাড়া সরাসরি প্লেয়ার পেজে রিডাইরেক্ট করা হচ্ছে
            window.location.replace("https://terabox-app.pages.dev/play?url=" + encodeURIComponent(videoUrl));
        } else {
            document.body.innerHTML = "<h3>ভিডিওর লিংক পাওয়া যায়নি!</h3>";
        }
    </script>
</body>
</html>
