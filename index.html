<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Online Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: sans-serif;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="videoPlayer" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>

    <script>
        // Telegram WebApp চালু করা
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        const urlParams = new URLSearchParams(window.location.search);
        const rawUrl = urlParams.get('url');

        if (rawUrl) {
            const player = document.getElementById('videoPlayer');
            
            // Terabox লিঙ্ক থেকে surl আইডি বের করা
            let match = rawUrl.match(/\/s\/([a-zA-Z0-9_-]+)/) || rawUrl.match(/surl=([a-zA-Z0-9_-]+)/);
            
            if (match && match[1]) {
                // Terabox এর নিজস্ব এমবেড প্লেয়ার
                player.src = "https://www.terabox.com/sharing/embed?surl=" + match[1];
            } else {
                player.src = "https://terabox-app.pages.dev/play?url=" + encodeURIComponent(rawUrl);
            }
        } else {
            document.body.innerHTML = "<h3>কোনো ভিডিও লিংক পাওয়া যায়নি!</h3>";
        }
    </script>
</body>
</html>
