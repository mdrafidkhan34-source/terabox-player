<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ⚠️ এটিই Terabox-এর ডোমেইন ও ভিডিও ব্লক সমাধান করবে -->
    <meta name="referrer" content="no-referrer">
    
    <title>Terabox Online Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: #fff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe id="player" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>

    <script>
        // Telegram WebApp প্রসারিত করা
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        const urlParams = new URLSearchParams(window.location.search);
        let rawUrl = urlParams.get('url');

        if (rawUrl) {
            // ডোমেইন ক্লিনআপ (1024terabox/4funbox ইত্যাদিকে terabox.com করা)
            let cleanUrl = rawUrl.replace(/1024terabox\.com|1024tera\.com|teraboxapp\.com|4funbox\.com|mirrobox\.com|nepobox\.com|freeterabox\.com/g, 'terabox.com');
            
            // প্লেয়ার লিংক তৈরি
            let playerUrl = "https://terabox-app.pages.dev/play?url=" + encodeURIComponent(cleanUrl);
            
            // iframe এ লোড করা
            document.getElementById('player').src = playerUrl;
        } else {
            document.body.innerHTML = "<h3 style='text-align:center; margin-top:45vh;'>❌ কোনো ভিডিও লিংক পাওয়া যায়নি!</h3>";
        }
    </script>
</body>
</html>
