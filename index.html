<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="videoPlayer" allowfullscreen allow="autoplay; fullscreen"></iframe>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');

        if (videoUrl) {
            document.getElementById('videoPlayer').src = "https://terabox-app.pages.dev/play?url=" + videoUrl;
        } else {
            document.body.innerHTML = "<h3 style='color:white; text-align:center;'>ভিডিওর লিংক পাওয়া যায়নি!</h3>";
        }
    </script>
</body>
</html>
