<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Online Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }
        #status {
            font-size: 16px;
            padding: 20px;
        }
        .player-box {
            width: 100%;
            height: 100vh;
            display: none;
        }
        video {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="status">⏳ ভিডিও লোড হচ্ছে, অনুগ্রহ করে কয়েক সেকেন্ড অপেক্ষা করুন...</div>

    <div class="player-box" id="playerContainer">
        <video id="player" controls playsinline autoplay></video>
    </div>

    <script>
        // Telegram WebApp প্রসারিত করা
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('url');

        if (targetUrl) {
            // Terabox লিঙ্ক থেকে Direct Video MP4 লিঙ্ক বের করার API
            fetch("https://terabox-dl.qtcloud.workers.dev/api/get-download?url=" + encodeURIComponent(targetUrl))
            .then(response => response.json())
            .then(data => {
                let streamUrl = data.download_link || (data.fast_download_link ? data.fast_download_link : null);
                
                if (streamUrl) {
                    startVideo(streamUrl);
                } else {
                    tryBackupApi(targetUrl);
                }
            })
            .catch(() => {
                tryBackupApi(targetUrl);
            });
        } else {
            document.getElementById('status').innerText = "❌ কোনো ভিডিও লিংক পাওয়া যায়নি!";
        }

        // ১ম API ব্যর্থ হলে ব্যাকআপ API
        function tryBackupApi(url) {
            fetch("https://terabox.ptmn.workers.dev/api?url=" + encodeURIComponent(url))
            .then(res => res.json())
            .then(data => {
                if (data && data.url) {
                    startVideo(data.url);
                } else {
                    document.getElementById('status').innerText = "❌ ভিডিও স্ট্রিম করা সম্ভব হচ্ছে না! লিংকটি আবার চেক করুন।";
                }
            })
            .catch(() => {
                document.getElementById('status').innerText = "❌ ভিডিও লোড করতে সমস্যা হয়েছে!";
            });
        }

        // ভিডিও প্লেয়ার চালু করার ফংশন
        function startVideo(directMp4Url) {
            document.getElementById('status').style.display = 'none';
            document.getElementById('playerContainer').style.display = 'block';

            const video = document.getElementById('player');
            video.src = directMp4Url;
            
            new Plyr('#player', {
                autoplay: true,
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen']
            });
        }
    </script>
</body>
</html>
