<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terabox Online Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #0088cc;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>🎬 ভিডিও লোড হচ্ছে, কয়েক সেকেন্ড অপেক্ষা করুন...</p>

    <script>
        // Telegram WebApp প্রসারিত করা
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // URL থেকে Terabox লিংক সংগ্রহ করা
        const urlParams = new URLSearchParams(window.location.search);
        let rawUrl = urlParams.get('url');

        if (rawUrl) {
            // ডোমেইন ক্লিনআপ (1024terabox, 4funbox ইত্যাদি -> terabox.com)
            let cleanUrl = rawUrl.replace(/1024terabox\.com|1024tera\.com|teraboxapp\.com|4funbox\.com|mirrobox\.com|nepobox\.com|freeterabox\.com/g, 'terabox.com');
            
            // ফ্রেম ব্লকেড এড়াতে সরাসরি ভিডিও প্লেয়ার পেজে রিডাইরেক্ট
            const playerEngine = "https://terabox-app.pages.dev/play?url=" + encodeURIComponent(cleanUrl);
            
            window.location.replace(playerEngine);
        } else {
            document.body.innerHTML = "<h3 style='color:red;'>❌ কোনো ভিডিও লিংক পাওয়া যায়নি!</h3>";
        }
    </script>
</body>
</html>
