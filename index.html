<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terabox Video Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #loader-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #0088cc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #status-text {
            font-size: 15px;
            color: #e0e0e0;
        }
        #video-box {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
        }
        .error {
            color: #ff4d4d;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loader-box">
        <div class="spinner" id="spinner"></div>
        <div id="status-text">🎬 ভিডিও লোড হচ্ছে, অনুগ্রহ করে একটু অপেক্ষা করুন...</div>
    </div>

    <div id="video-box">
        <video id="player" controls autoplay playsinline referrerpolicy="no-referrer"></video>
    </div>

    <script>
        // Telegram WebApp প্রসারিত করা
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        const loaderBox = document.getElementById('loader-box');
        const spinner = document.getElementById('spinner');
        const statusText = document.getElementById('status-text');
        const videoBox = document.getElementById('video-box');
        const player = document.getElementById('player');

        const urlParams = new URLSearchParams(window.location.search);
        let rawUrl = urlParams.get('url');

        if (!rawUrl) {
            showError("❌ কোনো ভিডিও লিংক পাওয়া যায়নি!");
        } else {
            // ডোমেইন ক্লিনআপ (1024terabox/4funbox -> terabox.com)
            let cleanUrl = rawUrl.replace(/1024terabox\.com|1024tera\.com|teraboxapp\.com|4funbox\.com|mirrobox\.com|nepobox\.com|freeterabox\.com/g, 'terabox.com');
            
            // surl আইডি বের করা
            let surl = "";
            let surlMatch = cleanUrl.match(/\/s\/([a-zA-Z0-9_-]+)/) || cleanUrl.match(/surl=([a-zA-Z0-9_-]+)/);
            if (surlMatch && surlMatch[1]) {
                surl = surlMatch[1];
            }

            fetchVideoStream(cleanUrl, surl);
        }

        function showError(msg) {
            spinner.style.display = 'none';
            statusText.innerHTML = `<span class="error">${msg}</span>`;
        }

        async function fetchVideoStream(url, surl) {
            statusText.innerText = "⚡ ভিডিও প্রসেস করা হচ্ছে...";

            const apis = [
                `https://terabox-dl.qtcloud.workers.dev/api/get-download?url=${encodeURIComponent(url)}`,
                `https://terabox.ptmn.workers.dev/api?url=${encodeURIComponent(url)}`
            ];

            let directLink = null;

            for (let api of apis) {
                try {
                    let res = await fetch(api);
                    if (res.ok) {
                        let data = await res.json();
                        directLink = data.download_link || data.fast_download_link || data.url || (data.list && data.list[0] && data.list[0].dlink);
                        if (directLink) break;
                    }
                } catch (e) {
                    console.log("API Error:", e);
                }
            }

            if (directLink) {
                startPlayer(directLink);
            } else if (surl) {
                let fallbackStream = `https://terabox-app.pages.dev/api/stream?surl=${surl}`;
                startPlayer(fallbackStream);
            } else {
                showError("❌ ভিডিও প্রস্তুত করা সম্ভব হয়নি। লিংকটি আবার চেক করুন।");
            }
        }

        function startPlayer(streamUrl) {
            loaderBox.style.display = 'none';
            videoBox.style.display = 'block';
            player.src = streamUrl;
            player.play().catch(e => console.log("Autoplay error:", e));
        }
    </script>
</body>
</html>
