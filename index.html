<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Online Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="player" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        const urlParams = new URLSearchParams(window.location.search);
        let rawUrl = urlParams.get('url');

        if (rawUrl) {
            // ১024terabox/1024tera ইত্যাদিকে terabox.com এ রূপান্তর
            let cleanUrl = rawUrl.replace(/1024terabox\.com|1024tera\.com|teraboxapp\.com|4funbox\.com|mirrobox\.com|nepobox\.com|freeterabox\.com/g, 'terabox.com');
            
            // সচল প্লেয়ারে ভিডিও লোড করা
            document.getElementById('player').src = "https://terabox-app.pages.dev/play?url=" + encodeURIComponent(cleanUrl);
        } else {
            document.body.innerHTML = "<h3 style='color:white; text-align:center; margin-top:40vh;'>ভিডিও লিংক পাওয়া যায়নি!</h3>";
        }
    </script>
</body>
</html>
